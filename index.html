<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ffffff">

<title>Países</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:system-ui;
margin:0;
padding:20px;
background:#f2f2f2;
max-width:700px;
margin:auto;
}

h1{
margin-top:0;
}

input[type="text"]{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:20px;
box-sizing:border-box;
}

.region{
margin-top:20px;
font-weight:bold;
}

.country{
background:white;
padding:8px;
margin:4px 0;
border-radius:6px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.country img{
width:28px;
}

.checkbox{
cursor:pointer;
}

.card{

position:fixed;
inset:0;
background:rgba(0,0,0,0.4);

display:flex;
align-items:center;
justify-content:center;

}

.card-content{

background:white;
padding:20px;
border-radius:10px;
max-width:350px;
width:90%;
text-align:center;

}

.card-content img{
width:120px;
}

.close{

margin-top:15px;
padding:8px 12px;
border:none;
background:#eee;
border-radius:6px;
cursor:pointer;

}

</style>

</head>

<body>

<h1>Países</h1>

<input id="search" type="text" placeholder="Buscar país...">

<div id="list"></div>

<script>

const url="https://restcountries.com/v3.1/all?fields=name,region,capital,population,flags,translations";

let countries=[];

let selected = JSON.parse(localStorage.getItem("selectedCountries") || "{}");

fetch(url)
.then(r=>r.json())
.then(data=>{

countries=data.map(c=>{

const nameES = c.translations?.spa?.common || c.name.common;

return{
...c,
nameES
};

}).sort((a,b)=>a.nameES.localeCompare(b.nameES));

render(countries);

});

function render(data){

const regions={};

data.forEach(c=>{

if(!regions[c.region]) regions[c.region]=[];

regions[c.region].push(c);

});

const container=document.getElementById("list");

container.innerHTML="";

Object.keys(regions).sort().forEach(region=>{

const r=document.createElement("div");

r.className="region";

r.textContent=region;

container.appendChild(r);

regions[region].forEach(c=>{

const div=document.createElement("div");

div.className="country";

div.innerHTML=`
<input class="checkbox" type="checkbox" ${selected[c.nameES] ? "checked" : ""}>
<img src="${c.flags.png}">
${c.nameES}
`;

const checkbox=div.querySelector("input");

checkbox.addEventListener("click",(e)=>{

e.stopPropagation();

if(checkbox.checked){
selected[c.nameES]=true;
}else{
delete selected[c.nameES];
}

localStorage.setItem("selectedCountries",JSON.stringify(selected));

});

div.addEventListener("click",()=>showCard(c));

container.appendChild(div);

});

});

}

function showCard(c){

const capital=c.capital ? c.capital[0] : "—";

const pop=c.population ? c.population.toLocaleString() : "—";

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="card-content">

<img src="${c.flags.png}">

<h2>${c.nameES}</h2>

<p><b>Capital:</b> ${capital}</p>

<p><b>Población:</b> ${pop}</p>

<p><b>Región:</b> ${c.region}</p>

<button class="close">Cerrar</button>

</div>

`;

card.querySelector(".close").onclick=()=>card.remove();

document.body.appendChild(card);

}

document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

const filtered=countries.filter(c=>
c.nameES.toLowerCase().includes(q)
);

render(filtered);

});

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>
</html>
