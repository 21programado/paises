<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ffffff">

<link rel="manifest" href="manifest.json">

<title>Países del mundo</title>

<style>

body{
font-family:system-ui;
margin:0;
padding:20px;
background:#f2f2f2;
max-width:700px;
margin:auto;
}

h1{
text-align:center;
}

ul{
list-style:none;
padding:0;
margin:0;
}

li{
background:white;
margin:6px 0;
padding:10px;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

li:hover{
background:#ececec;
}

li img{
width:28px;
height:20px;
object-fit:cover;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.card img{
width:100%;
max-height:140px;
object-fit:cover;
border-radius:6px;
}

.card h2{
margin:10px 0 5px 0;
}

</style>

</head>

<body>

<h1>Países del mundo</h1>

<div id="card"></div>

<ul id="countries"></ul>

<script>

const url="https://restcountries.com/v3.1/all?fields=name,capital,population,region,flags,currencies,languages,translations";

fetch(url)

.then(r=>r.json())

.then(data=>{

data.sort((a,b)=>{

const na=a.translations?.spa?.common||a.name.common;
const nb=b.translations?.spa?.common||b.name.common;

return na.localeCompare(nb);

});

const list=document.getElementById("countries");

data.forEach(c=>{

const nameES=c.translations?.spa?.common||c.name.common;

const li=document.createElement("li");

li.innerHTML=`
<img src="${c.flags.png}">
<span>${nameES}</span>
`;

li.onclick=()=>showCard(c);

list.appendChild(li);

});

});

function showCard(c){

const nameES=c.translations?.spa?.common||c.name.common;

const regiones={
Africa:"África",
Americas:"América",
Asia:"Asia",
Europe:"Europa",
Oceania:"Oceanía",
Antarctic:"Antártida"
};

const idiomas={
German:"alemán",
Spanish:"español",
English:"inglés",
French:"francés",
Portuguese:"portugués",
Italian:"italiano",
Dutch:"neerlandés",
Russian:"ruso",
Arabic:"árabe",
Chinese:"chino",
Japanese:"japonés"
};

const capital=c.capital?.[0]||"—";

const population=c.population
? c.population.toLocaleString("es-ES")
: "—";

const region=regiones[c.region]||c.region;

const moneda=c.currencies
? Object.values(c.currencies)[0].name
: "—";

const idioma=c.languages
? Object.values(c.languages)
.map(l=>idiomas[l]||l)
.join(", ")
: "—";

const card=document.getElementById("card");

card.innerHTML=`

<div class="card">

<img src="${c.flags.png}">

<h2>${nameES}</h2>

<p><b>Capital:</b> ${capital}</p>

<p><b>Población:</b> ${population}</p>

<p><b>Región:</b> ${region}</p>

<p><b>Moneda:</b> ${moneda}</p>

<p><b>Idioma:</b> ${idioma}</p>

</div>

`;

card.scrollIntoView({
behavior:"smooth"
});

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>

</html>
