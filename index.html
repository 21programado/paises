<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ffffff">

<title>Países</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:system-ui;
margin:0;
padding:20px;
background:#f2f2f2;
max-width:700px;
margin:auto;
}

h1{margin-top:0;}

#search{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:20px;
box-sizing:border-box;
}

.country{
background:white;
padding:10px;
margin:6px 0;
border-radius:6px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.country img{
width:30px;
}

.card{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
}

.card img{
width:120px;
}

</style>

</head>

<body>

<h1>Países</h1>

<input id="search" placeholder="Buscar país...">

<div id="card"></div>

<div id="list"></div>

<script>

const url = "https://restcountries.com/v3.1/all?fields=name,capital,population,region,flags,currencies,languages,translations";

let countries=[];

fetch(url)
.then(r=>r.json())
.then(data=>{

countries=data.sort((a,b)=>
a.name.common.localeCompare(b.name.common)
);

render(countries);

});

function render(data){

const container=document.getElementById("list");

container.innerHTML="";

data.forEach(c=>{

const div=document.createElement("div");

div.className="country";

div.innerHTML=`
<img src="${c.flags.png}">
${c.name.common}
`;

div.onclick=()=>showCard(c);

container.appendChild(div);

});

}

function showCard(c){

const nameES =
c.translations?.spa?.common ||
c.name.common;

const capital =
c.capital && c.capital.length
? c.capital[0]
: "—";

const population =
c.population
? c.population.toLocaleString()
: "—";

const moneda =
c.currencies
? Object.values(c.currencies)[0].name
: "—";

const idioma =
c.languages
? Object.values(c.languages).join(", ")
: "—";

document.getElementById("card").innerHTML = `

<div class="card">

<img src="${c.flags.png}">

<h2>${nameES}</h2>

<p><b>Capital:</b> ${capital}</p>

<p><b>Población:</b> ${population}</p>

<p><b>Región:</b> ${c.region}</p>
<p><b>Moneda:</b> ${moneda}</p>
<p><b>Idioma:</b> ${idioma}</p>

</div>

`;

}

document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

const filtered=countries.filter(c=>
c.name.common.toLowerCase().includes(q)
);

render(filtered);

});

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
